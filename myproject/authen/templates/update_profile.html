{% extends "main.html" %}
{% block content %}
<h1>UPDATE PROFILE PAGE</h1>

<form method="POST">
{% csrf_token %}
    <input type="text" name="first_name" value="{{data.first_name}}" placeholder="first name" required  ><br><br>
    <input type="text" name="last_name" value="{{data.last_name}}" placeholder="last name" required ><br><br>
    <input type="email" name="email"  value="{{data.email}}"placeholder="email" required ><br><br>
    <input type="text" name="username" value="{{data.username}}" placeholder="username" required ><br><br>
    <button type="submit">Submit</button><br><br>

</form>
<a href="{% url 'profile'%}"><button>Back</button></a>
{% endblock  %}
